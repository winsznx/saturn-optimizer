name: Check and Test

on:
  push:
  pull_request:

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Clarinet
        run: curl -L https://github.com/hirosystems/clarinet/releases/latest/download/clarinet-linux-x64-glibc.tar.gz | tar -xz && sudo mv clarinet /usr/local/bin/clarinet
      - name: Install dependencies
        run: npm install
      - name: Check contracts
        run: npm run check
      - name: Run tests
        run: npm test

